<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>سوق توتيل</title>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<style>

body{
margin:0;
padding:25px;
background:#f4f4f4;
font-family:Tahoma;
text-align:center;
}

h1{
color:#6d4c41;
margin-bottom:40px;
}

.product{

background:white;

max-width:420px;

margin:auto;

padding:30px;

border-radius:20px;

box-shadow:0 10px 25px rgba(0,0,0,.08);

}

.product h2{
font-size:28px;
}

.price{

font-size:34px;

color:#8d6e63;

margin:30px;

}

button{

width:100%;

padding:18px;

font-size:22px;

border:none;

border-radius:15px;

background:#8d6e63;

color:white;

cursor:pointer;

}

button:disabled{

opacity:.5;

}

#status{

margin-top:30px;

font-size:20px;

color:#444;

}

</style>

</head>

<body>

<h1>
🛒 سوق توتيل
</h1>

<div class="product">

<h2>
توب هزاز سويسري
</h2>

<div class="price">
π 1.5
</div>

<button id="buy">
شراء بالـ Pi
</button>

</div>

<div id="status"></div>

<script>

const statusBox =
document.getElementById("status");

const buyBtn =
document.getElementById("buy");

async function start(){

try{

if(!window.Pi){

statusBox.innerText =
"Pi Browser غير مكتشف";

return;

}

await Pi.init({

version:"2.0",

sandbox:false

});

statusBox.innerText =
"✅ جاهز للدفع";

}
catch(err){

statusBox.innerText =
"خطأ التهيئة: "
+ err.message;

}

}

start();

buyBtn.onclick =
async function(){

buyBtn.disabled=true;

try{

await Pi.createPayment(

{

amount:1.5,

memo:
"شراء توب هزاز سويسري",

metadata:{

product:
"top"

}

},

{

onReadyForServerApproval:

async function(paymentId){

statusBox.innerText =
"⏳ جاري اعتماد العملية";

console.log(
"APPROVE",
paymentId
);

/*
ضع API هنا لاحقاً
*/

},

onReadyForServerCompletion:

async function(
paymentId,
txid
){

statusBox.innerText =
"✅ تم الدفع";

console.log(
paymentId,
txid
);

},

onCancel:

function(){

statusBox.innerText =
"❌ تم الإلغاء";

buyBtn.disabled=false;

},

onError:

function(error){

console.log(error);

statusBox.innerText =
"⚠️ "
+

(
error.message
||

JSON.stringify(
error
)

);

buyBtn.disabled=false;

}

}

);

}
catch(err){

statusBox.innerText =
"فشل: "
+

(
err.message
||

JSON.stringify(
err
)

);

buyBtn.disabled=false;

}

};

</script>

</body>

</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>سوق توتيل</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f4f4f4; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: inline-block; }
        h1 { color: #6d4c41; }
        h2 { color: #333; }
        button { background: #6d4c41; color: white; padding: 15px 30px; border: none; border-radius: 8px; font-size: 20px; cursor: pointer; margin-top: 20px; }
        #msg { margin-top: 20px; font-weight: bold; color: #d32f2f; }
    </style>
</head>
<body>
    <h1>سوق توتيل 🛒</h1>
    <div class="card">
        <h2>توب هزاز سويسري</h2>
        <h2 style="color: #8d6e63;">π 1.5</h2>
        
        <button onclick="startPiPayment()">شراء بالـ Pi</button>
        <p id="msg"></p>
    </div>

    <script>
        function startPiPayment() {
            var msg = document.getElementById('msg');
            msg.style.color = "blue";
            msg.innerText = "جاري الاتصال بالشبكة... انتظر";

            try {
                // التهيئة بتشتغل بس لما تضغط الزر
                Pi.init({ version: "2.0", sandbox: true });

                // المصادقة
                Pi.authenticate(['payments'], function(payment) {
                    console.log("دفعة معلقة", payment);
                }).then(function(auth) {
                    msg.style.color = "green";
                    msg.innerText = "تم الربط! جاري فتح الدفع...";
                    
                    // طلب الدفع
                    Pi.createPayment({
                        amount: 1.5,
                        memo: "شراء توب هزاز سويسري",
                        metadata: { item: "top" }
                    }, {
                        onReadyForServerApproval: function(id) { msg.innerText = "في انتظار السيرفر..."; },
                        onReadyForServerCompletion: function(id, tx) { msg.innerText = "تم الدفع بنجاح يا شفت!"; },
                        onCancel: function(id) { msg.style.color = "orange"; msg.innerText = "ألغيت الدفع."; },
                        onError: function(err, id) { msg.style.color = "red"; msg.innerText = "خطأ في الدفع."; }
                    });
                }).catch(function(err) {
                    msg.style.color = "red";
                    msg.innerText = "اضغط على الزر مرة تانية بعد 3 ثواني.";
                });
            } catch(e) {
                msg.style.color = "red";
                msg.innerText = "جاري تحميل المكتبة، حاول تاني.";
            }
        }
    </script>
</body>
</html>

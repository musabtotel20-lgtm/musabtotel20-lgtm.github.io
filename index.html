<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>سوق توتيل</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f4f4f4; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: inline-block; }
        h1 { color: #6d4c41; }
        h2 { color: #333; }
        button { background: #6d4c41; color: white; padding: 15px 30px; border: none; border-radius: 8px; font-size: 20px; cursor: pointer; margin-top: 20px; }
        #msg { margin-top: 20px; font-weight: bold; color: #d32f2f; }
    </style>
</head>
<body>
    <h1>سوق توتيل 🛒</h1>
    <div class="card">
        <h2>توب هزاز سويسري</h2>
        <h2 style="color: #8d6e63;">π 1.5</h2>
        <button onclick="startPiPayment()">شراء بالـ Pi</button>
        <p id="msg"></p>
    </div>

    <script>
        // مفتاح الـ API الخاص بك مضاف هنا بنجاح
        const API_KEY = "1xirlfya1hvy6ac5v9xxoplnzzxbslvicbbgcjbelg4xzpgkyd09oie1iiqz1jsx";

        function startPiPayment() {
            var msg = document.getElementById('msg');
            msg.style.color = "blue";
            msg.innerText = "جاري الاتصال بالشبكة...";

            Pi.init({ version: "2.0", sandbox: true });

            Pi.authenticate(['payments'], function(payment) {
                console.log("دفعة معلقة", payment);
            }).then(function(auth) {
                msg.style.color = "green";
                msg.innerText = "تم الربط! جاري فتح الدفع...";
                
                Pi.createPayment({
                    amount: 1.5,
                    memo: "شراء توب هزاز سويسري",
                    metadata: { item: "top" }
                }, {
                    onReadyForServerApproval: function(paymentId) {
                        msg.innerText = "جاري إعطاء الموافقة التلقائية للشبكة...";
                        
                        // إرسال الموافقة مباشرة باستخدام المفتاح
                        fetch("https://corsproxy.io/?https://api.minepi.com/v2/payments/" + paymentId + "/approve", {
                            method: "POST",
                            headers: { "Authorization": "Key " + API_KEY }
                        }).then(response => {
                            msg.innerText = "تمت الموافقة من السيرفر! كمل الدفع من الشاشة الخرجت ليك.";
                        });
                    },
                    onReadyForServerCompletion: function(paymentId, txid) {
                        msg.innerText = "جاري تأكيد استلام الأموال...";
                        
                        // إرسال تأكيد الاستلام للشبكة
                        fetch("https://corsproxy.io/?https://api.minepi.com/v2/payments/" + paymentId + "/complete", {
                            method: "POST",
                            headers: { 
                                "Authorization": "Key " + API_KEY,
                                "Content-Type": "application/json"
                            },
                            body: JSON.stringify({ txid: txid })
                        }).then(response => {
                            msg.style.color = "green";
                            msg.innerText = "ألف مبروك! تمت العملية بنجاح تامة.";
                        });
                    },
                    onCancel: function(paymentId) { msg.style.color = "orange"; msg.innerText = "ألغيت الدفع."; },
                    onError: function(error, payment) { msg.style.color = "red"; msg.innerText = "خطأ في الدفع."; }
                });
            }).catch(function(error) {
                msg.style.color = "red";
                msg.innerText = "اضغط على الزر مرة تانية بعد 3 ثواني.";
            });
        }
    </script>
</body>
</html>

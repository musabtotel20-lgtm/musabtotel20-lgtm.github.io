<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سوق توتيل</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f4f4f4; }
        .product { background: white; padding: 20px; margin: 10px; border-radius: 10px; }
        button { background: #6d4c41; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>سوق توتيل</h1>
    <div class="product">
        <h3>توب هزاز سويسري</h3>
        <p>السعر: π 1.5</p>
        <button onclick="payWithPi(1.5, 'توب هزاز')">شراء بالـ Pi</button>
    </div>

    <script>
        Pi.init({ version: "2.0", sandbox: true });
        function payWithPi(amount, name) {
            Pi.createPayment({
                amount: amount,
                memo: "شراء " + name,
                metadata: { product: name },
            }, {
                onReadyForServerApproval: function(id) { alert("تم الطلب: " + id); },
                onReadyForServerCompletion: function(id, tx) { alert("نجح! المعاملة: " + tx); },
                onCancel: function(id) { alert("تم الإلغاء"); },
                onError: function(err, id) { alert("خطأ: " + err); }
            });
        }
    </script>
</body>
</html>
